const PROMPT_SYSTEME_INDIVIDUEL = `Tu es un assistant de formation spécialisé dans l'accompagnement professionnel des enseignants du secondaire en Fédération Wallonie-Bruxelles. Tu génères des rapports d'autopositionnement individuels à partir des résultats d'un questionnaire sur les enjeux de l'intelligence artificielle en éducation.

---

CONTEXTE DE LA FORMATION

La formation s'intitule « L'intelligence artificielle en éducation : cultiver un regard critique, éthique et sécurisé ». Elle dure deux jours et est structurée autour de quatre temps progressifs :
- COMPRENDRE : enjeux éthiques, cadre juridique (RGPD, AI Act, droit d'auteur)
- VÉRIFIER : fonctionnement de l'IA, hallucinations, biais, idéologies des modèles, grille PROMPT
- PROTÉGER : sobriété écologique, cybersécurité, cyber-résilience
- DÉCIDER : enjeux démocratiques et géopolitiques, charte d'utilisation, feuille de route personnelle

L'esprit critique est le fil conducteur transversal de toute la formation.

---

TON RÔLE

À partir des données JSON fournies par l'utilisateur, tu génères un rapport individuel d'autopositionnement qui :
1. Nomme clairement les profils dominants et les angles morts du participant
2. Explique ce que ces résultats signifient concrètement pour sa pratique d'enseignant
3. Crée un besoin d'apprendre en montrant l'écart entre sa situation actuelle et ce que la formation va lui apporter
4. Propose une lecture personnalisée des deux journées selon son profil
5. Intègre les réponses ouvertes pour personnaliser le ton et les exemples

---

RÈGLES ABSOLUES

1. NE JAMAIS formuler le rapport comme un jugement de valeur ou une évaluation de compétence. Utilise exclusivement le registre du besoin de formation et de la prise de conscience.

2. NE JAMAIS utiliser les mots « faible », « mauvais », « insuffisant », « échec » ou tout terme dévalorisent. Utilise à la place : « angle mort », « enjeu à explorer », « terrain à développer », « dimension encore peu investie ».

3. NE JAMAIS présenter un enjeu avec un score bas comme une lacune personnelle. Présente-le comme une opportunité offerte par la formation.

4. TOUJOURS ancrer chaque commentaire dans la réalité professionnelle de l'enseignant du secondaire en FWB, avec des exemples concrets liés à la classe, aux élèves, aux collègues, à l'établissement.

5. TOUJOURS terminer chaque section par une phrase qui crée un pont explicite avec une séquence ou une activité de la formation (mentionner COMPRENDRE / VÉRIFIER / PROTÉGER / DÉCIDER selon pertinence).

6. ADAPTER le registre au profil d'entrée :
   - debutant : ton rassurant, exemples très concrets, éviter le jargon
   - observateur : ton encourageant, valoriser la curiosité, montrer l'accessibilité
   - experimentateur : ton stimulant, reconnaître les pratiques existantes, pointer les angles morts
   - integrateur : ton de pair à pair, reconnaître la maîtrise, pointer les enjeux systémiques et politiques

7. NE JAMAIS inventer des informations sur le participant. Te limiter strictement aux données fournies.

8. Si une réponse ouverte est vide ou non renseignée, ignorer ce champ sans le signaler.

---

STRUCTURE DU RAPPORT À PRODUIRE

Le rapport est structuré en 5 parties. Respecte cette structure sans la modifier.

### PARTIE 1 — Ton profil en un coup d'œil (max. 80 mots)
Un paragraphe synthétique qui résume le profil global en langage naturel. Citer les 2 profils dominants et les 2 angles morts. Utiliser une métaphore ou une image concrète si possible. Ne pas lister des scores bruts.

### PARTIE 2 — Tes points d'appui (max. 150 mots)
Développer les 2 enjeux avec les scores les plus élevés. Pour chacun :
- Ce que le score révèle de la pratique actuelle
- Un exemple concret lié à l'enseignement en secondaire
- Ce que la formation va permettre d'approfondir ou de structurer

### PARTIE 3 — Tes angles morts (max. 200 mots)
Développer les 2 enjeux avec les scores les plus faibles. Pour chacun :
- Ce que l'angle mort signifie concrètement dans la pratique quotidienne
- Un exemple de situation où cet angle mort peut avoir des conséquences
- Ce que la formation va apporter sur cet enjeu spécifiquement
- Le lien explicite avec une séquence ou une activité de la formation

Note : si l'Esprit critique figure parmi les angles morts, le signaler explicitement comme priorité et fil conducteur de toute la formation.

### PARTIE 4 — Ce que tu m'as dit (max. 150 mots)
Intégrer les réponses ouvertes de manière fluide, sans les citer mot pour mot.
- Reformuler ce que le participant a exprimé dans ses réponses ouvertes
- Montrer que ces préoccupations ou questions sont légitimes et seront traitées
- Créer un lien entre ce que le participant « apporte » et ce que la formation va lui donner
Si les réponses ouvertes sont toutes vides, remplacer par : « Tu as choisi de ne pas répondre aux questions ouvertes. C'est tout à fait normal pour un premier contact avec ces enjeux. La formation te donnera de nombreuses occasions d'exprimer tes questions au fil des deux journées. »

### PARTIE 5 — Ta feuille de route pour les deux jours (max. 150 mots)
Une lecture personnalisée de la formation selon le profil :
- Quelles séquences seront les plus confortables (profils dominants)
- Quelles séquences méritent une attention particulière (angles morts)
- Un conseil pratique et concret pour tirer le meilleur parti des deux journées
- Une phrase de conclusion qui donne envie de commencer

---

FORMAT DE SORTIE

- Markdown structuré avec les 5 titres de section
- Longueur totale : 600 à 750 mots
- Langue : français, registre professionnel bienveillant
- Pas de listes à puces dans les parties 1, 4 et 5
- Des listes à puces courtes sont acceptées dans les parties 2 et 3 pour structurer les deux enjeux
- Ne pas inclure de scores numériques dans le texte du rapport

/* ==========================================================
   UTILITAIRES
   ========================================================== */

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function letterFromIndex(i) { return ['A','B','C','D','E','F'][i]; }

/* ==========================================================
   SCORING
   ========================================================== */
function getScoreBrut(qid, reponse) {
  const q = QUESTIONS[qid];
  if (!q) return null;
  if (q.type === 'choix') {
    return q.score[reponse] ?? null;
  }
  if (q.type === 'likert') {
    if (qid === 'E5') return LIKERT_E5_MAPPING[reponse] ?? reponse;
    return reponse;
  }
  return null;
}

function normaliserScore(brut, q) {
  if (q.type === 'likert' && q.normalizeMax === 5 && QUESTIONS[Object.keys(QUESTIONS).find(k=>QUESTIONS[k]===q)] !== QUESTIONS.E5) {
    // J5, Eco3, EC4, CS3, D2, G3 : 1→5 normalisé
    return ((brut - 1) / (5 - 1)) * 100;
  }
  // E5 a été ramené à 1→4 par le mapping → on normalise sur 1→4
  return ((brut - 1) / (4 - 1)) * 100;
}

function calculerScoresEnjeux() {
  for (const enjeuId in SCORED_QUESTIONS_PAR_ENJEU) {
    const ids = SCORED_QUESTIONS_PAR_ENJEU[enjeuId];
    const scoresNorm = [];
    const scoresBruts = [];
    for (const qid of ids) {
      const rep = state.reponses[qid];
      if (rep === undefined || rep === null) continue;
      const brut = getScoreBrut(qid, rep);
      if (brut === null || brut === 0) continue;
      const q = QUESTIONS[qid];
      let norm;
      if (q.type === 'likert' && qid !== 'E5') {
        norm = ((brut - 1) / (5 - 1)) * 100;
      } else {
        norm = ((brut - 1) / (4 - 1)) * 100;
      }
      scoresNorm.push(norm);
      scoresBruts.push(brut);
    }
    if (scoresNorm.length === 0) {
      state.scores_normalises[enjeuId] = 0;
      state.scores[enjeuId] = 0;
    } else {
      state.scores_normalises[enjeuId] = Math.round(scoresNorm.reduce((a,b)=>a+b,0) / scoresNorm.length);
      state.scores[enjeuId] = state.scores_normalises[enjeuId];
    }
  }
  // Profils
  const sorted = Object.entries(state.scores_normalises).sort((a,b) => b[1] - a[1]);
  state.profils_dominants = [sorted[0][0], sorted[1][0]];
  state.angles_morts = [sorted[sorted.length-1][0], sorted[sorted.length-2][0]];
}

/* ==========================================================
   GÉNÉRATION DU RAPPORT — 3 modes selon le contexte
   1. Netlify Function (clé sécurisée côté serveur)
   2. Proxy local server.py
   3. Appel direct avec clé utilisateur (fallback)
   ========================================================== */
async function genererRapportIndividuel() {
  const userPayload = {
    profil_entree: state.profil_entree,
    contexte_ecole: state.contexte_ecole,
    scores: state.scores,
    profils_dominants: state.profils_dominants,
    angles_morts: state.angles_morts,
    reponses_ouvertes: state.reponses_ouvertes,
    boussole: state.boussole
  };

  // — Mode 1 : Netlify Function —
  try {
    const r = await fetch('/.netlify/functions/proxy', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        systemPrompt: PROMPT_SYSTEME_INDIVIDUEL,
        userContent:  JSON.stringify(userPayload)
      })
    });
    // 404 = pas sur Netlify → on passe au mode suivant
    if (r.status === 404) throw new Error('netlify_unavailable');
    if (!r.ok) {
      const e = await r.json().catch(() => ({}));
      throw new Error(e?.error?.message || `Netlify proxy ${r.status}`);
    }
    const d = await r.json();
    return d.text;
  } catch (err) {
    if (err.message !== 'netlify_unavailable' && !err.message.includes('Failed to fetch')) throw err;
  }

  // — Mode 2 : proxy local server.py —
  const provider = state.apiProvider || detecterProvider(state.apiKey);
  const pconf    = PROVIDERS[provider] || PROVIDERS.anthropic;
  const model    = state.apiModel || pconf.defaultModel;
  const apiUrl   = provider === 'compatible'
    ? (state.apiCustomUrl.replace(/\/$/, '') + '/chat/completions')
    : pconf.url;

  const isAnthropic = provider === 'anthropic';
  const apiBody = isAnthropic
    ? { model, max_tokens: CONFIG.API_MAX_TOKENS, temperature: CONFIG.API_TEMPERATURE,
        system: PROMPT_SYSTEME_INDIVIDUEL,
        messages: [{ role: 'user', content: JSON.stringify(userPayload) }] }
    : { model, max_tokens: CONFIG.API_MAX_TOKENS, temperature: CONFIG.API_TEMPERATURE,
        messages: [{ role: 'system', content: PROMPT_SYSTEME_INDIVIDUEL },
                   { role: 'user',   content: JSON.stringify(userPayload) }] };
  const apiHeaders = isAnthropic
    ? { 'x-api-key': state.apiKey, 'anthropic-version': '2023-06-01' }
    : { 'Authorization': 'Bearer ' + state.apiKey };

  try {
    const r = await fetch('/api/proxy', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url: apiUrl, headers: apiHeaders, body: apiBody })
    });
    if (r.status !== 404 && r.status !== 0) {
      if (!r.ok) {
        const e = await r.json().catch(() => ({}));
        throw new Error(e?.error?.message || `Proxy local ${r.status}`);
      }
      const d = await r.json();
      return isAnthropic ? d.content[0].text : d.choices[0].message.content;
    }
  } catch (err) {
    if (!err.message.includes('Failed to fetch') && !err.message.includes('404')) throw err;
  }

  // — Mode 3 : appel direct (fallback) —
  const r = await fetch(apiUrl, {
    method: 'POST',
    mode: 'cors',
    headers: {
      'Content-Type': 'application/json',
      ...apiHeaders,
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify(apiBody)
  });
  if (!r.ok) {
    const e = await r.json().catch(() => ({}));
    throw new Error(e?.error?.message || `API ${r.status}`);
  }
  const d = await r.json();
  return isAnthropic ? d.content[0].text : d.choices[0].message.content;
}


/* ==========================================================
   PARSEUR MARKDOWN MINIMAL
   ========================================================== */
function renderMarkdown(md) {
  const lines = md.split('\n');
  let html = '';
  let inList = false;
  let paraBuf = [];

  function flushPara() {
    if (paraBuf.length) {
      html += '<p>' + inlineFormat(paraBuf.join(' ')) + '</p>';
      paraBuf = [];
    }
  }
  function closeList() { if (inList) { html += '</ul>'; inList = false; } }

  function inlineFormat(s) {
    s = escapeHtml(s);
    s = s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    s = s.replace(/(^|[^*])\*([^*\n]+)\*/g, '$1<em>$2</em>');
    return s;
  }

  for (let raw of lines) {
    const line = raw.trim();
    if (!line) {
      flushPara();
      closeList();
      continue;
    }
    if (line.startsWith('### ')) {
      flushPara(); closeList();
      html += '<h3>' + inlineFormat(line.slice(4)) + '</h3>';
    } else if (line.startsWith('## ')) {
      flushPara(); closeList();
      html += '<h2>' + inlineFormat(line.slice(3)) + '</h2>';
    } else if (line.startsWith('# ')) {
      flushPara(); closeList();
      html += '<h2>' + inlineFormat(line.slice(2)) + '</h2>';
    } else if (line.startsWith('- ') || line.startsWith('* ')) {
      flushPara();
      if (!inList) { html += '<ul>'; inList = true; }
      html += '<li>' + inlineFormat(line.slice(2)) + '</li>';
    } else {
      closeList();
      paraBuf.push(line);
    }
  }
  flushPara(); closeList();
  return html;
}

/* ==========================================================

const app = document.getElementById('app');

function setEcran(n) {
  state.ecranActuel = n;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function progress(step, total) {
  const pct = Math.round((step / total) * 100);
  return `
    <div class="progress-label">Étape ${step} / ${total}</div>
    <div class="progress-bar-container"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
  `;
}

function separateur(orn) {
  const o = orn || '❧';
  return `<div class="separateur"><span>${o}</span></div>`;
}

function render() {
  const n = state.ecranActuel;
  if (n === 0) renderEcranConsentement();
  else if (n === 1) renderEcranMiseEnRoute();
  else if (n >= 2 && n <= 8) renderEcranEnjeu(n - 2);
  else if (n === 9) renderEcranBoussole();
  else if (n === 10) renderEcranGeneration();
  else if (n === 11) renderEcranRapport();
}

/* ----- Écran 10 : Génération ----- */
function renderEcranGeneration() {
  app.innerHTML = `
    <div class="ecran">
      <div class="loader-container">
        <div class="loader-orbe"></div>
        <div class="loader-texte" id="loader-text">Analyse en cours…</div>
      </div>
    </div>
  `;
  const messages = [
    "Cartographie de vos profils dominants…",
    "Identification de vos angles morts…",
    "Rédaction de votre rapport personnalisé…",
    "Mise en forme finale…"
  ];
  let i = 0;
  const interval = setInterval(() => {
    const el = document.getElementById('loader-text');
    if (el) el.textContent = messages[i % messages.length];
    i++;
  }, 2200);

  // Calculer scores et profils
  calculerScoresEnjeux();

  if (state.sansIA) {
    clearInterval(interval);
    state.rapport = '';
    state.rapportError = null;
    setEcran(11);
    return;
  }

  if (!state.apiKey) {
    clearInterval(interval);
    state.rapportError = "Aucune clé API configurée. Revenez à l'accueil et renseignez une clé, ou cochez « Sans analyse IA ».";
    setEcran(11);
    return;
  }

  const pAPI = genererRapportIndividuel();

  Promise.allSettled([pAPI]).then(([rApi]) => {
    clearInterval(interval);
    if (rApi.status === 'fulfilled') {
      state.rapport = rApi.value;
      state.rapportError = null;
    } else {
      const errMsg = rApi.reason?.message || String(rApi.reason);
      const isCors = errMsg.toLowerCase().includes('failed to fetch') || errMsg.toLowerCase().includes('network');
      console.error('[API Error]', rApi.reason);
      state.rapportError = "Une erreur est survenue lors de la génération du rapport individuel.\n\nDétail : " + errMsg
        + (isCors ? "\n\n⚠️ Causes possibles :\n• Brave Shields pas encore désactivés → icône 🦁 dans la barre d'adresse\n• Clé API invalide ou expirée\n• Connexion réseau instable\n\nOuvrez la console (F12) pour plus de détails." : "");
    }
    setEcran(11);
  });
}

/* ==========================================================

   ========================================================== */
function renderQuestionCard(qid, num) {
  const q = QUESTIONS[qid];
  if (!q) return '';
  let inner = '';
  if (q.type === 'choix') {
    inner = `<div class="options" data-qid="${qid}">${
      q.options.map((opt, i) => {
        const letter = letterFromIndex(i);
        const sel = state.reponses[qid] === letter ? 'selected' : '';
        return `
          <label class="option ${sel}" data-letter="${letter}">
            <span class="option-lettre">${letter}</span>
            <span class="option-text">${escapeHtml(opt)}</span>
          </label>
        `;
      }).join('')
    }</div>`;
  } else if (q.type === 'likert') {
    const cur = state.reponses[qid];
    inner = `
      <div class="likert-container" data-qid="${qid}">
        ${[1,2,3,4,5].map(v => `
          <div class="likert-option ${cur === v ? 'selected' : ''}" data-value="${v}">${v}</div>
        `).join('')}
      </div>
      <div class="likert-labels">
        <span>${escapeHtml(q.labels[0])}</span>
        <span>${escapeHtml(q.labels[1])}</span>
      </div>
    `;
  } else if (q.type === 'ouverte') {
    inner = `<textarea data-qid="${qid}" placeholder="${escapeHtml(q.placeholder || '')}">${escapeHtml(state.reponses_ouvertes[qid] || '')}</textarea>`;
  }
  const help = q.help ? `<div class="q-help">${escapeHtml(q.help)}</div>` : '';
  return `
    <div class="carte-question">
      <p class="q-text"><span class="q-num">${qid}</span>${escapeHtml(q.text)}</p>
      ${help}
      ${inner}
    </div>
  `;
}

function attachQuestionHandlers(qids) {
  const container = document.getElementById('questions-container');
  qids.forEach(qid => {
    const q = QUESTIONS[qid];
    if (q.type === 'choix') {
      const opts = container.querySelectorAll(`.options[data-qid="${qid}"] .option`);
      opts.forEach(el => {
        el.addEventListener('click', () => {
          opts.forEach(o => o.classList.remove('selected'));
          el.classList.add('selected');
          state.reponses[qid] = el.dataset.letter;
        });
      });
    } else if (q.type === 'likert') {
      const opts = container.querySelectorAll(`.likert-container[data-qid="${qid}"] .likert-option`);
      opts.forEach(el => {
        el.addEventListener('click', () => {
          opts.forEach(o => o.classList.remove('selected'));
          el.classList.add('selected');
          state.reponses[qid] = parseInt(el.dataset.value, 10);
        });
      });
    } else if (q.type === 'ouverte') {
      const ta = container.querySelector(`textarea[data-qid="${qid}"]`);
      if (ta) {
        ta.addEventListener('input', () => {
          state.reponses_ouvertes[qid] = ta.value;
        });
      }
    }
  });
}

/* ==========================================================
   RADAR SVG
   ========================================================== */
function buildRadarSVG() {
  const ids = ['ethique','juridique','ecologique','esprit_critique','cybersecurite','democratique','geopolitique'];
  const labels = ids.map(i => NOM_ENJEUX_AFFICHE[i]);
  const values = ids.map(i => state.scores_normalises[i] || 0);
  const N = ids.length;
  const cx = 200, cy = 200, R = 140;
  const angleStep = (2 * Math.PI) / N;

  function point(i, ratio) {
    const a = -Math.PI / 2 + i * angleStep;
    return [cx + Math.cos(a) * R * ratio, cy + Math.sin(a) * R * ratio];
  }

  let webs = '';
  for (let lvl = 1; lvl <= 5; lvl++) {
    const ratio = lvl / 5;
    const pts = [];
    for (let i = 0; i < N; i++) {
      const [x, y] = point(i, ratio);
      pts.push(`${x.toFixed(1)},${y.toFixed(1)}`);
    }
    webs += `<polygon points="${pts.join(' ')}" fill="none" stroke="rgba(18,118,118,0.18)" stroke-width="1"/>`;
  }

  let axes = '';
  for (let i = 0; i < N; i++) {
    const [x, y] = point(i, 1);
    axes += `<line x1="${cx}" y1="${cy}" x2="${x.toFixed(1)}" y2="${y.toFixed(1)}" stroke="rgba(18,118,118,0.25)" stroke-width="1"/>`;
  }

  const polyPts = [];
  const dots = [];
  for (let i = 0; i < N; i++) {
    const ratio = (values[i] || 0) / 100;
    const [x, y] = point(i, ratio);
    polyPts.push(`${x.toFixed(1)},${y.toFixed(1)}`);
    dots.push(`<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="5" fill="var(--retro-orange)"/>`);
  }

  let lbls = '';
  for (let i = 0; i < N; i++) {
    const [x, y] = point(i, 1.18);
    lbls += `<text class="radar-label" x="${x.toFixed(1)}" y="${y.toFixed(1)}" text-anchor="middle" dominant-baseline="middle">${escapeHtml(labels[i])}</text>`;
  }

  return `
    <svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Radar des enjeux">
      ${webs}
      ${axes}
      <polygon points="${polyPts.join(' ')}" fill="rgba(18,118,118,0.25)" stroke="var(--retro-teal)" stroke-width="2"/>
      ${dots.join('')}
      ${lbls}
    </svg>
  `;
}
